services:
  postgres:
    image: postgres:16-alpine
    container_name: ghenapp_postgres
    environment:
      POSTGRES_DB: ghenapp
      POSTGRES_USER: ghen
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - ghenapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghen -d ghenapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ghenapp_redis
    ports:
      - "6379:6379"
    volumes:
      - ghenapp_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ghenapp_pgdata:
  ghenapp_redisdata:
